{% load static bootstrap5 %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{% static 'img/icon.png' %}">
    {% bootstrap_css %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>{{ voto.categoria.nome }}</title>
</head>

<body>





    <div class="container d-flex justify-content-center align-items-center min-vh-100">

        <div class="card shadow-lg p-4 w-100" style="max-width: 700px;">

            <h1 class="text-center mb-4 text-success">{{ voto.categoria.nome }}</h1>

            <form method="POST" id="formVoto">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="button" class="btn btn-success" data-bs-toggle="modal"
                    data-bs-target="#confirmarVotoModal" id="confirmarVoto" disabled>
                    Votar
                </button>

                <a href="{% url 'votacao' %}" class="btn btn-secondary">
                    Voltar
                </a>

            </form>
            <div class="modal fade" id="confirmarVotoModal" tabindex="-1">

                <div class="modal-dialog modal-dialog-centered">

                    <div class="modal-content">

                        <div class="modal-header">
                            <h5 class="modal-title">Confirmar voto</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>

                        <div class="modal-body text-center">

                            <p class="fw-bold">
                                Deseja confirmar seu voto?
                            </p>

                            <p class="fw-bold text-center">
                                Revise seu voto:
                            </p>

                            <div id="resumoVoto" class="mb-3"></div>

                            <p class="text-danger">
                                Não será possível alterar depois da confirmação.
                            </p>

                        </div>

                        <div class="modal-footer justify-content-center">

                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                                Cancelar
                            </button>

                            <button type="button" class="btn btn-success"
                                onclick="document.getElementById('formVoto').submit();">
                                Confirmar voto
                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>






    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% bootstrap_javascript %}
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const labels = document.querySelectorAll("form label");

            labels.forEach(label => {
                label.classList.add("form-label");
            });
        });
    </script>
    <script src="{% static 'js/revisarVoto.js' %}"></script>
    <script src="{% static 'js/confirmaVoto.js' %}"></script>
</body>

</html>
